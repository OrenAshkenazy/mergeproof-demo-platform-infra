image:
  repository: ghcr.io/orenashkenazy/mergeproof-demo-payments-api
  tag: demo

service:
  name: payments-api
  namespace: payments

workers:
  refund_worker:
    enabled: false
    service: payments-api

env:
  LOG_LEVEL: info
  WORKER_QUEUE: refunds
  REFUND_PROVIDER_URL: https://refunds.provider.internal
  REFUND_QUEUE_NAME: refunds-intake
  CHARGEBACK_PROVIDER_URL: https://chargebacks.provider.internal
