apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: payments-api-runtime-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: payments-api-runtime-secrets
  data:
    - secretKey: DISPUTE_API_KEY
      remoteRef:
        key: payments-api/dispute-api-key
    - secretKey: REFUND_PROVIDER_TOKEN
      remoteRef:
        key: payments-api/refund-provider-token
