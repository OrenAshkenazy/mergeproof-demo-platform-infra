apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: payments-api-provider-token
  namespace: payments
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: provider-token
  data:
    - secretKey: REFUND_PROVIDER_TOKEN
      remoteRef:
        key: payments-api/refund-provider-token
