apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: external-payment-service-egress
  namespace: payments
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: refund-worker
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 203.0.113.10/32
      ports:
        - protocol: TCP
          port: 443

