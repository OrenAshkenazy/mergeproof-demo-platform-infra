apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api-payout_settlement_worker
  labels:
    app: payments-api
    component: payout_settlement_worker
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: payout_settlement_worker
          image: payments-api:latest
          command: ["python", "-m", "app.workers.payout_settlement_worker"]
          # Runtime env is injected from the service-level aggregate ConfigMap +
          # ExternalSecret (managed by MergeProof's aggregate_env_wiring). Names are
          # static, so no per-variable coordination is needed.
          envFrom:
            - configMapRef:
                name: payments-api-runtime-config
            - secretRef:
                name: payments-api-runtime-secrets
