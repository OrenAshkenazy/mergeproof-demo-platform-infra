apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api-payout_worker
  labels:
    app: payments-api
    component: payout_worker
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: payout_worker
          image: payments-api:latest
          command: ["python", "-m", "app.workers.payout_worker"]
