apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api-refund_worker
  labels:
    app: payments-api
    component: refund_worker
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: refund_worker
          image: payments-api:latest
          command: ["python", "-m", "app.workers.refund_worker"]
