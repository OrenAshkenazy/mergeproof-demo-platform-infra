apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api-notification_worker
  labels:
    app: payments-api
    component: notification_worker
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: notification_worker
          image: payments-api:latest
          command: ["python", "-m", "app.workers.notification_worker"]
